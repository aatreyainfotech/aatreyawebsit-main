<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <style>
      .bg {
        fill: #0B1023;
      }
      .border {
        fill: none;
        stroke: #B89A3D;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .text {
        fill: #D4AF37;
        font-family: "Noto Serif Devanagari", "Mangal", serif;
        font-size: 58px;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" class="bg"/>

  <!-- Rounded Border -->
  <rect
    x="12"
    y="12"
    width="104"
    height="104"
    rx="14"
    ry="14"
    class="border"/>

  <!-- Letter -->
  <text
    x="64"
    y="73"
    text-anchor="middle"
    dominant-baseline="middle"
    class="text">आ</text>

</svg>